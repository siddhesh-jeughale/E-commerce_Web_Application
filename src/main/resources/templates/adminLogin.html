<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css}">

    <link rel="stylesheet" th:href="@{/css/adminLogin.css}">
</head>
<body>
<div class="admin-auth-card fade-in">

    <div class="mb-4">
        <a th:href="@{/}" class="admin-brand">Artistry Studio</a>
        <span class="badge bg-light text-dark border rounded-pill px-3">
            Administration Portal
        </span>
    </div>

    <!-- Admin Login Form -->
    <div th:if="${param.error}" class="alert alert-danger text-center py-2 mb-3" role="alert">
        <i class="bi bi-exclamation-circle me-1"></i> Invalid email or password. Please try again.
    </div>
    <form th:action="@{/admin/login}" method="post">

        <div class="text-start mb-3">
            <label class="form-label small fw-bold text-muted ms-3">
                Username / Email
            </label>
            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="admin@artistry.com"
                   required>
        </div>

        <div class="text-start mb-3">
            <label class="form-label small fw-bold text-muted ms-3">
                Password
            </label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="••••••••"
                   required>
        </div>

<!--        <div class="d-flex justify-content-between align-items-center mb-4 px-2">-->
<!--            <div class="form-check">-->
<!--                <input type="checkbox"-->
<!--                       class="form-check-input"-->
<!--                       id="keepSigned"-->
<!--                       name="remember-me">-->
<!--                <label class="form-check-label small text-muted" for="keepSigned">-->
<!--                    Keep me signed in-->
<!--                </label>-->
<!--            </div>-->
<!--        </div>-->

        <button type="submit" class="btn btn-admin w-100">
            Access Dashboard
        </button>

    </form>

    <a th:href="@{/}" class="back-link">
        <i class="bi bi-arrow-left me-1"></i> Back to Website
    </a>

</div>

</body>
</html>
