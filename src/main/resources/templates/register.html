<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | Artistry Studio</title>

    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>

<body>
<div class="auth-container">
    <div class="row h-100 g-0">

        <div class="col-md-6 auth-image-side">
            <div class="auth-quote">
                <h2 class="font-playfair display-6 fw-bold mb-3">Welcome to Artistry Studio.</h2>
                <p class="lead mb-0">"Every artist dips his brush in his own soul, and paints his own nature into his pictures."</p>
                <small class="d-block mt-2 opacity-75">— Henry Ward Beecher</small>
            </div>
        </div>

        <div class="col-md-6 auth-form-side">

            <div class="d-flex justify-content-between align-items-center mb-5">
                <a th:href="@{/}" class="text-decoration-none text-muted small">
                    <i class="bi bi-arrow-left me-1"></i> Back to Home
                </a>
                <img th:src="@{/images/logo.png}" alt="Logo" width="100px" class="d-md-none">
            </div>

            <!-- Success / Error Messages -->
            <div th:if="${success}" class="alert alert-success small" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger small" th:text="${error}"></div>

            <div class="fade-in-form">
                <h3 class="font-playfair fw-bold mb-1">Create Account</h3>
                <p class="text-muted mb-4">Join our community of art lovers.</p>

                <form th:action="@{/register}" method="post">

                    <div class="mb-3">
                        <input type="text" name="username" class="form-control"
                               placeholder="Full Name" required>
                    </div>

                    <div class="mb-3">
                        <input type="email" name="email" class="form-control"
                               placeholder="Email Address" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col-6">
                            <input type="password" name="password" class="form-control"
                                   placeholder="Password" required>
                        </div>
                        <div class="col-6">
                            <input type="password" name="confirmPassword" class="form-control"
                                   placeholder="Confirm" required>
                        </div>
                    </div>

<!--                    <div class="form-check mb-4">-->
<!--                        <input type="checkbox" class="form-check-input" id="terms" required>-->
<!--                        <label class="form-check-label small text-muted" for="terms">-->
<!--                            I agree to the <a href="#">Terms & Conditions</a>-->
<!--                        </label>-->
<!--                    </div>-->

                    <button type="submit" class="btn btn-primary btn-auth">Sign Up</button>
                </form>

                <div class="text-center mt-5">
                    <p class="small mb-0">
                        Already have an account?
                        <a th:href="@{/login}" class="fw-bold text-primary text-decoration-none">Sign In</a>
                    </p>
                </div>
            </div>

        </div>
    </div>
</div>

<script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
