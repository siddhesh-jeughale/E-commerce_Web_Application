<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div id="dashboard-tab" class="tab-content fade-in delay-1">
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="stat-card text-white" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);">
                    <div class="stat-icon bg-white text-primary bg-opacity-25 shadow-sm" style="color: white !important;"><i class="bi bi-palette"></i></div>
                    <div><h2 class="mb-0 fw-bold">156</h2><small class="text-white-50 text-uppercase fw-semibold tracking-wider">Total Artworks</small></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card text-white" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); border: none; box-shadow: 0 10px 20px rgba(56, 239, 125, 0.3);">
                    <div class="stat-icon bg-white text-success bg-opacity-25 shadow-sm" style="color: white !important;"><i class="bi bi-currency-dollar"></i></div>
                    <div><h2 class="mb-0 fw-bold">₹1.2L</h2><small class="text-white-50 text-uppercase fw-semibold tracking-wider">Total Revenue</small></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card text-white" style="background: linear-gradient(135deg, #FA709A 0%, #FEE140 100%); border: none; box-shadow: 0 10px 20px rgba(250, 112, 154, 0.3);">
                    <div class="stat-icon bg-white text-warning bg-opacity-25 shadow-sm" style="color: white !important;"><i class="bi bi-bag-check-fill"></i></div>
                    <div><h2 class="mb-0 fw-bold">128</h2><small class="text-white-50 text-uppercase fw-semibold tracking-wider">Total Orders</small></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card text-white" style="background: linear-gradient(135deg, #f83600 0%, #f9d423 100%); border: none; box-shadow: 0 10px 20px rgba(248, 54, 0, 0.3);">
                    <div class="stat-icon bg-white text-danger bg-opacity-25 shadow-sm" style="color: white !important;"><i class="bi bi-bag"></i></div>
                    <div><h2 class="mb-0 fw-bold">24</h2><small class="text-white-50 text-uppercase fw-semibold tracking-wider">Pending Orders</small></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card text-white" style="background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%); border: none; box-shadow: 0 10px 20px rgba(102, 166, 255, 0.3);">
                    <div class="stat-icon bg-white text-info bg-opacity-25 shadow-sm" style="color: white !important;"><i class="bi bi-truck"></i></div>
                    <div><h2 class="mb-0 fw-bold">5</h2><small class="text-white-50 text-uppercase fw-semibold tracking-wider">Shipped</small></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card text-white" style="background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); border: none; box-shadow: 0 10px 20px rgba(161, 140, 209, 0.3);">
                    <div class="stat-icon bg-white text-primary bg-opacity-25 shadow-sm" style="color: white !important;"><i class="bi bi-people"></i></div>
                    <div><h2 class="mb-0 fw-bold">8.5k</h2><small class="text-white-50 text-uppercase fw-semibold tracking-wider">Site Visits</small></div>
                </div>
            </div>
        </div>

<!--        </div>-->
    </div>

</body>
</html>
