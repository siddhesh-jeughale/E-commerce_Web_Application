<div id="messages-tab" class="tab-content fade-in">
    <div class="table-card">
        <h5 class="mb-4">Recent Inquiries</h5>

        <div class="table-responsive">
            <table class="table table-hover align-middle admin-datatable w-100">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Sender</th>
                        <th>Subject</th>
                        <th>Message</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="msg : ${messages}">
                        <td class="text-nowrap" th:text="${#temporals.format(msg.createdAt, 'dd MMM yyyy HH:mm')}">Date</td>
                        <td class="fw-bold" th:text="${msg.name}">Name</td>
                        <td class="text-primary" th:text="${msg.subject}">Subject</td>
                        <td>
                            <span class="d-inline-block text-truncate" style="max-width: 250px;" th:text="${msg.message}" title="${msg.message}">Message</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
