<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | Artistry Studio</title>

    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<section class="success-wrapper">
    <div class="success-card">

        <div class="icon-box">
            <i class="bi bi-check-lg"></i>
        </div>

        <h2 class="font-playfair fw-bold mb-3">Thank You For Your Order!</h2>
        <p class="text-muted">Your order has been placed successfully. A confirmation email has been sent to
            <span class="fw-bold text-dark" th:text="${user.email}">
                user@example.com
            </span>.
        </p>

        <div class="order-details-box">
            <div class="detail-row">
                <span class="detail-label">Order Number:</span>
                <span class="detail-value"
                      th:text="${order.orderNumber}">
                    #ORD-2024-8892
                </span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Date:</span>
                <span class="detail-value"
                      th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy')}">
                    Oct 24, 2024
                </span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Payment Method:</span>
                <span class="detail-value"
                      th:text="${order.paymentMethod}">
                    Credit Card
                </span>
            </div>
            <div class="detail-row border-top pt-2 mt-2">
                <span class="detail-label">Total Amount:</span>
                <span class="detail-value text-primary fs-5"
                      th:text="'₹' + ${order.total}">
                    ₹2,350
                </span>
            </div>

            <!--            <div class="detail-row">-->
<!--                <span class="detail-label">Order Number:</span>-->
<!--                <span class="detail-value">#ORD-2024-8892</span>-->
<!--            </div>-->
<!--            <div class="detail-row">-->
<!--                <span class="detail-label">Date:</span>-->
<!--                <span class="detail-value">Oct 24, 2024</span>-->
<!--            </div>-->
<!--            <div class="detail-row">-->
<!--                <span class="detail-label">Payment Method:</span>-->
<!--                <span class="detail-value">Credit Card (**** 4242)</span>-->
<!--            </div>-->
<!--            <div class="detail-row border-top pt-2 mt-2">-->
<!--                <span class="detail-label">Total Amount:</span>-->
<!--                <span class="detail-value text-primary fs-5">₹2,350</span>-->
<!--            </div>-->
        </div>

<!--        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">-->
<!--            <a th:href="@{orders}" class="btn btn-outline-dark rounded-pill px-4">View Order</a>-->
<!--            <a th:href="@{shop}" class="btn btn-primary rounded-pill px-4">Continue Shopping</a>-->
<!--        </div>-->
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
<!--            <a th:href="@{/orders/{id}(id=${order.id})}"-->
            <a th:href="@{/orders}"
               class="btn btn-outline-dark rounded-pill px-4">
                View Order
            </a>

            <a th:href="@{/shop}"
               class="btn btn-primary rounded-pill px-4">
                Continue Shopping
            </a>
        </div>


    </div>
</section>


<script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
