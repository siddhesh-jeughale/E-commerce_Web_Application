<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Error ' + ${errorCode} + ' | Artistry Studio'">Error | Artistry Studio</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        .error-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            max-width: 520px;
            width: 90%;
            color: white;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .error-code {
            font-size: 6rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #e2e8f0;
        }

        .error-message {
            color: #a0aec0;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn-home {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.2s, transform 0.2s;
        }

        .btn-home:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            color: white;
        }

        .btn-back {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #a0aec0;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-right: 0.75rem;
            transition: all 0.2s;
        }

        .btn-back:hover {
            border-color: rgba(255, 255, 255, 0.5);
            color: white;
        }

        .error-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
    </style>
</head>

<body>
    <div class="error-card">

        <!-- Icon based on error code -->
        <span class="error-icon" th:classappend="${errorCode == '403'} ? 'bi bi-shield-lock-fill text-warning'
                        : (${errorCode == '404'} ? 'bi bi-search text-info'
                        : (${errorCode == '413'} ? 'bi bi-file-earmark-x-fill text-danger'
                        : 'bi bi-exclamation-triangle-fill text-danger'))">
        </span>

        <!-- Error Code -->
        <div class="error-code" th:text="${errorCode ?: '500'}">500</div>

        <!-- Error Title -->
        <div class="error-title" th:text="${errorTitle ?: 'Something went wrong'}">Something went wrong</div>

        <!-- Error Message -->
        <p class="error-message" th:text="${errorMessage ?: 'An unexpected error occurred. Please try again.'}">
            An unexpected error occurred. Please try again.
        </p>

        <!-- Actions -->
        <div>
            <a href="javascript:history.back()" class="btn-back">
                <i class="bi bi-arrow-left me-2"></i>Go Back
            </a>
            <a th:href="@{/}" class="btn-home">
                <i class="bi bi-house-fill me-2"></i>Go Home
            </a>
        </div>

    </div>
</body>

</html>
