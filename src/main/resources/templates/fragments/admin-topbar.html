<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="topbar">
    <div class="admin-topbar fade-in">
        <div class="d-flex align-items-center">
            <button class="btn btn-outline-dark d-lg-none me-3 border-0" id="sidebarToggle">
                <i class="bi bi-list fs-4"></i>
            </button>
            <h4 class="mb-0 font-playfair" id="pageTitle" th:text="${pageTitle ?: 'Overview'}">Overview</h4>
        </div>
        <div class="d-flex align-items-center">
            <div class="dropdown">
                <a href="#" class="d-flex align-items-center text-decoration-none text-dark" data-bs-toggle="dropdown">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=random&color=fff" class="rounded-circle me-2" width="40" height="40" alt="Admin">
                    <div class="d-none d-md-block">
                        <small class="d-block fw-bold" sec:authentication="name">Admin User</small>
                        <small class="text-muted" style="font-size: 0.75rem;">Administrator</small>
                    </div>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Profile</a></li>
                    <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i>Settings</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" th:href="@{/admin/logout}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
