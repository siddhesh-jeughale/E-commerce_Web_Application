<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="sidebar(activeTab)">
    <nav class="sidebar" id="sidebar">
        <a th:href="@{/}" class="sidebar-brand">Artistry Admin</a>
        <div class="d-flex flex-column">
            <a th:href="@{/admin}"
               th:classappend="${activeTab == 'dashboard' ? 'nav-link-admin active' : 'nav-link-admin'}">
                <i class="bi bi-grid-1x2-fill"></i> Dashboard
            </a>
            <a th:href="@{/admin/pages}"
               th:classappend="${activeTab == 'pages' ? 'nav-link-admin active' : 'nav-link-admin'}">
                <i class="bi bi-laptop-fill"></i> Site Content
            </a>
            <a th:href="@{/admin/artworks}"
               th:classappend="${activeTab == 'artworks' ? 'nav-link-admin active' : 'nav-link-admin'}">
                <i class="bi bi-palette-fill"></i> Artworks
            </a>
            <a th:href="@{/admin/orders}"
               th:classappend="${activeTab == 'orders' ? 'nav-link-admin active' : 'nav-link-admin'}">
                <i class="bi bi-bag-check-fill"></i> Orders
            </a>
            <a th:href="@{/admin/messages}"
               th:classappend="${activeTab == 'messages' ? 'nav-link-admin active' : 'nav-link-admin'}">
                <i class="bi bi-envelope-fill"></i> Messages
                <span class="badge bg-danger ms-auto rounded-pill" th:text="${messageCount}">
                    3
                </span>
            </a>
<!--            <div class="mt-5 border-top border-secondary pt-3">-->
<!--                <a th:href="@{/admin/logout}" class="nav-link-admin">-->
<!--                    <i class="bi bi-box-arrow-left"></i> Logout / View Site-->
<!--                </a>-->
<!--            </div>-->
            <div class="mt-5 border-top border-secondary pt-3">

                <!-- Hidden logout form -->
                <form th:action="@{/admin/logout}" method="post" id="adminLogoutForm">
<!--                    <input type="hidden"-->
<!--                           th:name="${_csrf.parameterName}"-->
<!--                           th:value="${_csrf.token}">-->
                </form>

                <!-- Logout link -->
                <a href="#"
                   class="nav-link-admin"
                   onclick="document.getElementById('adminLogoutForm').submit(); return false;">
                    <i class="bi bi-box-arrow-left"></i> Logout / View Site
                </a>

            </div>

        </div>
    </nav>
</th:block>
</body>
</html>
