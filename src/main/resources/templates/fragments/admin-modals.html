<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="allModals">

    <!-- Hero Slide Modal -->
    <div class="modal fade" id="modalHeroSlide" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title font-playfair fw-bold">Add Hero Slide</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-3">
                    <form th:action="@{/admin/pages/home/hero/add}"
                          method="post" enctype="multipart/form-data">
<!--                        <input type="hidden"-->
<!--                               th:name="${_csrf.parameterName}"-->
<!--                               th:value="${_csrf.token}" />-->
<!--                        <input type="hidden" name="id" value="">-->
                        <div class="mb-3">
                            <label class="small fw-bold">Slide Image</label>
                            <input type="file" class="form-control" name="imageFile" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold"> Heading</label>
                            <input type="text" class="form-control" name="heading" placeholder="e.g. Emotions on Canvas" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Subtext</label>
                            <textarea class="form-control" rows="2" name="subtext" required></textarea>
                        </div>

                        <div class="text-end">
                            <button type="button" class="btn btn-light rounded-pill me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-4">Save Slide</button>
                        </div>
<!--                        <div class="modal-footer border-0 pt-0">-->
<!--                            <button class="btn btn-primary rounded-pill px-4">Save Slide</button>-->
<!--                        </div>-->
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Page Header Model-->
    <div class="modal fade" id="HeadersModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title font-playfair fw-bold" >Add Page Header</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-3">
                <form id="sectionHeaderForm" th:action="@{/admin/pages/about/header/add}" method="post" enctype="multipart/form-data">
                    <input type="hidden" name="id" id="entityId">
                    <div class="mb-3">
                        <label class="small fw-bold">Header Image</label>
                        <input type="file" class="form-control" name="imageFile" accept="image/*">
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold"> Heading</label>
                        <input type="text" class="form-control" name="title" placeholder="e.g. Emotions on Canvas">
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold">Subtext</label>
                        <textarea class="form-control" rows="2" name="subtext"></textarea>
                    </div>

                    <div class="text-end">
                        <button type="button" class="btn btn-light rounded-pill me-2" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary rounded-pill px-4">Save Slide</button>
                    </div>
                </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Testimonial Modal -->
    <div class="modal fade" id="modalTestimonial" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title font-playfair fw-bold">Add Testimonial</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-3">
                    <form th:action="@{/admin/pages/home/testimonial/add}" method="post" enctype="multipart/form-data">
                        <input type="hidden" name="id">
                        <div class="mb-3">
                            <input type="text" class="form-control" name="clientName" placeholder="Client Name" required>
                        </div>
                        <div class="mb-3">
                            <input type="text" class="form-control" name="role" placeholder="Role" required>
                        </div>
                        <div class="mb-3">
                            <input type="text" class="form-control" name="location" placeholder="Location" required>
                        </div>
                        <div class="mb-3">
                            <textarea class="form-control" name="quote" rows="3" placeholder="Quote..." required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="small text-muted fw-bold">Client Image</label>
                            <input type="file" class="form-control" name="imageFile" accept="image/*">
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-light rounded-pill me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-4">Save Testimonial</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Award Modal -->
    <div class="modal fade" id="modalAward" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title font-playfair fw-bold">Add Award</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-3">
                    <form th:action="@{/admin/pages/about/awards/add}" method="post" enctype="multipart/form-data">
                        <input type="hidden" name="id">
                        <div class="mb-3">
                            <label class="small fw-bold">Award Image</label>
                            <input type="file" class="form-control" name="imageFile" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Award Title</label>
                            <input type="text" class="form-control" name="title" placeholder="e.g. International Art Excellence" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Subtitle </label>
                            <input type="text" class="form-control" name="subtitle" placeholder="e.g. First Prize • 2023" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Award Date</label>
                            <input type="datetime-local" class="form-control" name="awardDate" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Description</label>
                            <textarea class="form-control" name="description" rows="2" placeholder="e.g. Awarded in Paris..."></textarea>
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-light rounded-pill me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-4">Save Award</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Exhibition Modal -->
    <div class="modal fade" id="modalExhibition" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title font-playfair fw-bold">Add Exhibition</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-3">
                    <form th:action="@{/admin/pages/shop/exhibition/add}" method="post" enctype="multipart/form-data">
                        <input type="hidden" name="id">
                        <div class="mb-3">
                            <label class="small fw-bold">Exhibition Image</label>
                            <input type="file" class="form-control" name="imageFile" accept="image/*">
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="small fw-bold">Badge Text</label>
                                <input type="text" class="form-control" name="yearBadge" placeholder="e.g. March 2024" required>
                            </div>
                            <div class="col-6">
                                <label class="small fw-bold">Exhibition Title</label>
                                <input type="text" class="form-control" name="title" placeholder="e.g. Urban Rhythms" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Type</label>
                            <input type="text" class="form-control" name="type" placeholder="e.g. Solo Exhibition" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Location</label>
                            <input type="text" class="form-control" name="location" placeholder="e.g. Metropolitan Art Gallery, NYC" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Exhibition Date</label>
                            <input type="datetime-local"
                                   class="form-control"
                                   name="startDate"
                                   required>
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-light rounded-pill me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-4">Save Exhibition</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- FAQ Modal -->
    <div class="modal fade" id="modalFAQ" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title font-playfair fw-bold">Add Question</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-3">
                    <form th:action="@{/admin/pages/contact/FAQ/add}" method="post">
                        <input type="hidden" name="id">
                        <div class="mb-3">
                            <input type="text" class="form-control" name="question" placeholder="Question" required>
                        </div>
                        <div class="mb-3">
                            <textarea class="form-control" name="answer" rows="3" placeholder="Answer..." required></textarea>
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-light rounded-pill me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-4">Save Question</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Studio Modal -->
    <div class="modal fade" id="modalStudio" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title font-playfair fw-bold">Add Studio</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-3">
                    <form th:action="@{/admin/pages/gallery/studio/add}" method="post">
                        <input type="hidden" name="id">
                        <div class="mb-3">
                            <label class="small fw-bold">Video URL</label>
                            <input type="text" class="form-control" name="videoURL" placeholder="Video URL" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Title</label>
                            <input type="text" class="form-control" name="title" placeholder=" Video Title" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Description</label>
                            <textarea class="form-control" name="description" rows="3" placeholder="Description" required></textarea>
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-light rounded-pill me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-4">Save Studio</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Art Modal -->
    <div class="modal fade" id="addArtModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title font-playfair fw-bold">Add New Artwork</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-4">
                    <form th:action="@{/admin/artworks/add}" method="post" enctype="multipart/form-data">
                        <input type="hidden" name="id">
                        <div class="mb-3">
                            <label class="form-label small text-muted fw-bold">Title</label>
                            <input type="text" class="form-control" name="title" placeholder="Artwork Name" required>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label small text-muted fw-bold">Medium</label>
                                <select class="form-select" name="medium" required>
                                    <option value="">Select Medium</option>
                                    <option value="Oil">Oil</option>
                                    <option value="Watercolor">Watercolor</option>
                                    <option value="Acrylic">Acrylic</option>
                                    <option value="Abstract">Abstract</option>
                                    <option value="Landscape">Landscape</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label small text-muted fw-bold">Price (₹)</label>
                                <input type="number" class="form-control" name="price" step="0.01" placeholder="0.00" required>
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label small text-muted fw-bold">Category</label>
                                <select class="form-select" name="category" required>
                                    <option value="">Select Category</option>
                                    <option value="Originals">Originals</option>
                                    <option value="Prints">Prints</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label small text-muted fw-bold">Size</label>
                                <input type="text" class="form-control" name="size"  required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-muted fw-bold">Upload Image</label>
                            <input type="file" class="form-control" name="imageFile" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-muted fw-bold">Status</label>
                            <div class="d-flex gap-2 flex-wrap">
                                <input type="radio" class="btn-check" name="status" id="s1" value="Available" autocomplete="off" checked>
                                <label class="btn btn-outline-success rounded-pill btn-sm" for="s1">Available</label>
                                <input type="radio" class="btn-check" name="status" id="s2" value="Reserved" autocomplete="off">
                                <label class="btn btn-outline-warning rounded-pill btn-sm" for="s2">Reserved</label>
                                <input type="radio" class="btn-check" name="status" id="s3" value="Sold" autocomplete="off">
                                <label class="btn btn-outline-danger rounded-pill btn-sm" for="s3">Sold</label>
                            </div>
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-light rounded-pill me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-4">Save Artwork</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
